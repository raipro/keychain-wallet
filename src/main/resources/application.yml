spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:h2:mem:walletdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

wallet:
  # Fixed per-order deduction: ₹100 in paise. Configurable so the business rule
  # is not buried in code.
  deduct-amount-paise: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
